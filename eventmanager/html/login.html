<!DOCTYPE html>
<html lang="bg" data-theme="light">

<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.0/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/res/style.css" />
</head>

<body>
    <header id="header">
    </header>

    <section class="section">
        <div class="container is-max-tablet">
            <h1 class="title" id="event-title">Вход</h1>
            <div class="box">
                <div class="field">
                    <label class="label">Имейл</label>
                    <div class="control">
                        <input class="input" type="text" id="email">
                    </div>
                </div>
                <div class="field">
                    <label class="label">Парола</label>
                    <div class="control">
                        <input class="input" type="password" id="password">
                    </div>
                </div>
                <button class="button is-primary is-fullwidth" id="submit">Вход</button>
                <p>Нямате регистрация? <a href="/signup">Създаване на регистрация</a></p>
                <p><a href="/reset">Забравена парола?</a></p>
            </div>
            <p class="help is-danger mt-2" id="error" style="display:none"></p>
        </div>
        </div>
    </section>

    <script type="module">
        import { Header } from '/js/header.js';
        document.getElementById('header').innerHTML = Header('events');
    </script>

    <script>
        document.getElementById('submit').addEventListener('click', function () {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!email || !password) {
                error.textContent = 'Моля, попълнете всички полета.';
                error.style.display = 'block';
                return;
            }

            fetch(`/api/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            })
                .then(r => r.json())
                .then(res => {
                    if (res.success)
                        window.location.href = `/home`;
                    else {
                        error.textContent = res.error || 'Възникна грешка.';
                        error.style.display = 'block';
                    }
                });
        });

        document.getElementById('password').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') document.getElementById('submit').click();
        });

    </script>


    <script type="module">
        import { header } from '/js/header.js';
        header();
    </script>
</body>

</html>
