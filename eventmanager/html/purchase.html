<!DOCTYPE html>
<html lang="bg" data-theme="light">

<head>
    <meta charset="UTF-8">
    <title>Купи билет</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.0/css/bulma.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/res/style.css" />
</head>

<body>

    <header id="header">
    </header>

    <section class="section">
        <div class="container is-max-tablet">
            <h1 class="title" id="event-title">Зареждане...</h1>
            <div class="box">
                <div class="field">
                    <label class="label">Име</label>
                    <div class="control">
                        <input class="input" type="text" id="first_name">
                    </div>
                </div>
                <div class="field">
                    <label class="label">Фамилия</label>
                    <div class="control">
                        <input class="input" type="text" id="last_name">
                    </div>
                </div>
                <div class="field">
                    <label class="label">Имейл</label>
                    <div class="control">
                        <input class="input" type="email" id="email">
                    </div>
                </div>
                <div class="field">
                    <label class="label">Телефон</label>
                    <div class="control">
                        <input class="input" type="tel" id="phone">
                    </div>
                </div>
                <button class="button is-primary is-fullwidth" id="submit">Потвърди покупката</button>
                <p class="help is-danger mt-2" id="error" style="display:none"></p>
            </div>
        </div>
    </section>
    <script type="module">
        import { Header } from '/js/header.js';
        document.getElementById('header').innerHTML = Header('events');
    </script>

    <script>
        const id = window.location.pathname.split('/').pop();

        // Данни за събитието
        fetch(`/api/events/${id}`)
            .then(r => r.json())
            .then(e => {
                document.getElementById('event-title').textContent = e.title;
            });

        document.getElementById('submit').addEventListener('click', function () {
            const first_name = document.getElementById('first_name').value.trim();
            const last_name = document.getElementById('last_name').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const error = document.getElementById('error');

            if (!first_name || !last_name || !email || !phone) {
                error.textContent = 'Моля попълнете всички полета.';
                error.style.display = 'block';
                return;
            }

            fetch(`/api/purchase/${id}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ first_name, last_name, email, phone })
            })
                .then(r => r.json())
                .then(res => {
                    if (res.success)
                        window.location.href = `/confirmation/${res.ticket_id}`;
                    else {
                        error.textContent = res.error || 'Възникна грешка.';
                        error.style.display = 'block';
                    }
                });
        });
    </script>
</body>

</html>
