<!doctype html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>EventMGR</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/css/splide.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/js/splide.min.js"></script>
    <link rel="stylesheet" href="/res/style.css" />
    <link rel="stylesheet" href="/res/home.css" />
</head>

<body>
    <header id="header">
    </header>

    <main class="container">
        <section class="hero is-halfheight">
            <div class="hero-body">
                <div class="hero-body-bg">
                    <p class="title is-2">Система за управление на събития</p>
                    <p class="subtitle is-4">Организация на събития и купуване на билети</p>
                </div>
                <div id="event-carousel">
                    <div class="splide">
                        <div class="splide__track">
                            <ul class="splide__list" id="carousel-list">
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { header } from '/js/header.js';
        import { getEventCard } from '/js/events.js';
        header();

        // TODO: да се извеждат най-популярните събития
        fetch('/api/events')
            .then(r => r.json())
            .then(events => {
                document.querySelector('.splide__list').innerHTML = events.map(e => `
                    <li class="splide__slide">
                        ${getEventCard(e)}
                    </li>
                `).join('');
                new Splide('.splide', {
                    type: 'loop',
                    perPage: 3,
                    gap: '1rem',
                }).mount();
            });
    </script>

</body>

</html>
